<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Page Not Found</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6c5ce7;
      --secondary: #a29bfe;
      --bg-color: #f8f9fd;
      --text-dark: #2d3436;
      --text-light: #636e72;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      padding: 20px;
    }

    /* Background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      z-index: 0;
      animation: float 10s infinite alternate ease-in-out;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: #dcd6ff;
      top: -150px;
      left: -150px;
    }

    .blob-2 {
      width: 400px;
      height: 400px;
      background: #ffeaa7;
      bottom: -120px;
      right: -120px;
    }

    /* Card */
    .error-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 550px;
      padding: 50px 35px;
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 20px 60px rgba(108,92,231,0.15);

      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards;
    }

    .error-icon {
      font-size: 4rem;
      margin-bottom: 15px;
      animation: bounce 2s infinite;
    }

    .error-code {
      font-size: 7rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 15px;

      background: linear-gradient(
        135deg,
        var(--primary),
        var(--secondary)
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      color: var(--text-dark);
      font-size: 2rem;
      margin-bottom: 15px;
    }

    p {
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 25px;
      font-size: 1rem;
    }

    .info-box {
      background: rgba(108,92,231,0.05);
      border-left: 4px solid var(--primary);
      border-radius: 10px;
      padding: 15px;
      text-align: left;
      margin-bottom: 30px;
    }

    .info-box h4 {
      color: var(--primary);
      margin-bottom: 8px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-box p {
      margin: 0;
      color: var(--text-dark);
      font-size: 0.9rem;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      transition: 0.3s ease;
      font-size: 0.95rem;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 20px rgba(108,92,231,0.3);
    }

    .btn-primary:hover {
      background: #5649c0;
      transform: translateY(-3px);
    }

    .btn-outline {
      border: 2px solid #dfe6e9;
      color: var(--text-light);
      background: white;
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      from {
        transform: translate(0, 0);
      }
      to {
        transform: translate(30px, 30px);
      }
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    @media (max-width: 600px) {
      .error-code {
        font-size: 5rem;
      }

      h1 {
        font-size: 1.6rem;
      }

      .error-card {
        padding: 40px 25px;
      }
    }
  </style>
</head>

<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="error-card">

    <div class="error-icon">🚀</div>

    <div class="error-code">404</div>

    <h1>Page Not Found</h1>

    <p>
      The page you are looking for may have been moved,
      deleted, or never existed.
    </p>

    <div class="info-box">
      <h4>What happened?</h4>
      <p>
        A 404 error means the server could not find
        the page you requested.
      </p>
    </div>

    <div class="btn-group">
      <a href="/" class="btn btn-primary">
        Go Home
      </a>

      <a href="javascript:history.back()" class="btn btn-outline">
        Go Back
      </a>
    </div>

  </div>

</body>
</html>
